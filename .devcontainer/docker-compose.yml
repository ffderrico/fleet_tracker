services:
  workspace:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - USERNAME=${USER:-devuser}
    volumes:
      - ../:/workspaces/fleet-tracker:cached
    command: sleep infinity
    depends_on:
      - db
      - redis
      - kafka

  # The PostGIS Database
  db:
    image: postgis/postgis:15-3.3
    restart: unless-stopped
    environment:
      POSTGRES_USER: fleet_admin
      POSTGRES_PASSWORD: fleet_password
      POSTGRES_DB: fleet_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Redis for caching
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  # Kafka for messaging
  kafka:
      image: apache/kafka:3.7.0
      restart: unless-stopped
      environment:
        KAFKA_NODE_ID: 1
        KAFKA_PROCESS_ROLES: broker,controller
        KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
        # Advertises the internal Docker network name 'kafka' so our Go app can route to it
        KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
        KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
        KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
        KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
        # Keeps our local, single-node cluster from complaining about missing backup nodes
        KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
        KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      ports:
        - "9092:9092"

volumes:
  pgdata: